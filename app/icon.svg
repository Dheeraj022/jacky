<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth dark rounded rectangle background -->
  <rect width="512" height="512" rx="128" fill="#0f0f0f"/>
  
  <!-- Subtle inner border gradient or glow -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#borderGlow)" stroke-width="8" opacity="0.6"/>

  <!-- Glowing background behind the letter -->
  <circle cx="256" cy="256" r="160" fill="url(#coreGlow)" opacity="0.15" />

  <!-- Elegant letter "J" using a custom path for a modern serif/sans-serif hybrid look -->
  <path d="M 280 140 
           L 340 140 
           L 340 320 
           C 340 390, 290 410, 230 410 
           C 170 410, 130 380, 130 320 
           L 190 320 
           C 190 350, 210 365, 235 365 
           C 265 365, 280 350, 280 310 
           Z" 
        fill="url(#amberGradient)" 
        filter="url(#dropShadow)" />

  <defs>
    <!-- Gradients -->
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa726" />
      <stop offset="100%" stop-color="#f57c00" />
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9800" />
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow Filter for Depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#ff9800" flood-opacity="0.3" />
    </filter>
  </defs>
</svg>
